services:
  gateway:
    build:
      context: ..
      dockerfile: deploy/dockerfiles/gateway.Dockerfile
    environment:
      CONVERT_HTTP_ADDR: ":8080"
      CONVERT_PDF_ENDPOINT: "pdf-service:9001"
      CONVERT_IMAGE_ENDPOINT: "image-service:9002"
      CONVERT_MEDIA_ENDPOINT: "media-service:9003"
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - minio
      - nats

  worker:
    build:
      context: ..
      dockerfile: deploy/dockerfiles/worker.Dockerfile
    depends_on:
      - postgres
      - minio
      - nats

  pdf-service:
    build:
      context: ..
      dockerfile: deploy/dockerfiles/pdf-service.Dockerfile
    environment:
      CONVERT_HTTP_ADDR: ":9001"
    ports:
      - "9001:9001"

  image-service:
    build:
      context: ../services/image-service
    ports:
      - "9002:9002"

  media-service:
    build:
      context: ../services/media-service
    ports:
      - "9003:9003"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: convert
      POSTGRES_PASSWORD: convert
      POSTGRES_DB: convert
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: convert
      MINIO_ROOT_PASSWORD: convert-secret
    ports:
      - "9000:9000"
      - "19001:9001"

  nats:
    image: nats:2
    command: ["-js"]
    ports:
      - "4222:4222"
